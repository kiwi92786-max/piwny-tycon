<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEER TYCOON: FULL FIX</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --gold: #ffcc00; --beer: #f39c12; --neon: #00f2ff;
            --bg: #050505; --panel: #111; --card: #1a1a1a; 
            --rebirth: #9b59b6; --caps: #e74c3c; --success: #2ecc71;
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; }
        #game-container { display: grid; grid-template-columns: 85px 1fr 450px; width: 100%; height: 100%; }

        /* SIDEBAR */
        #sidebar { background: #000; border-right: 2px solid #222; display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 10px; z-index: 100; }
        .nav-btn {
            width: 65px; height: 65px; background: #080808; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; font-size: 10px; transition: 0.2s; border: 1px solid #222; text-align: center; color: #888;
        }
        .nav-btn b { font-size: 20px; }
        .nav-btn.active { border-color: var(--gold); background: #1a1a10; color: var(--gold); }

        /* MAIN VIEW */
        #main-view { position: relative; overflow: hidden; display: flex; flex-direction: column; background: #111; background-image: url('https://images.unsplash.com/photo-1514933651103-005eec06c04b'); background-size: cover; background-position: center; }
        #main-view::after { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.75); pointer-events: none; z-index: 1; }
        #hud { position: relative; z-index: 10; padding: 15px; display: grid; grid-template-columns: repeat(4, 1fr); background: rgba(0,0,0,0.9); border-bottom: 2px solid #333; gap: 10px; }
        .stat-val { font-size: 1.2rem; font-weight: 900; color: var(--gold); text-align: center; }

        #click-zone { position: relative; z-index: 5; flex: 1; display: flex; align-items: center; justify-content: center; }
        #main-target { font-size: 150px; cursor: pointer; user-select: none; transition: 0.1s; z-index: 10; }
        #main-target:active { transform: scale(0.85); }

        /* PANEL */
        #side-panel { background: var(--panel); border-left: 2px solid #222; display: flex; flex-direction: column; z-index: 50; overflow: hidden; }
        .tab-header { padding: 20px; font-size: 1.1rem; color: var(--gold); border-bottom: 1px solid #333; background: #000; text-align: center; font-weight: bold; }
        .content { flex: 1; overflow-y: auto; padding: 15px; scroll-behavior: smooth; scrollbar-width: thin; scrollbar-color: var(--gold) #111; }
        .content::-webkit-scrollbar { width: 6px; }
        .content::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        /* CARDS */
        .item-card { background: var(--card); border: 1px solid #333; padding: 12px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; transition: 0.2s; position: relative; }
        .item-card:hover { border-color: var(--gold); }
        .price { color: var(--gold); font-weight: bold; }
        .badge { position: absolute; top: 5px; right: 5px; font-size: 0.6rem; background: var(--success); color: black; padding: 2px 5px; border-radius: 3px; font-weight: bold; }
        .equipped { background: #1a251a !important; border-color: var(--success) !important; }

        /* KASYNO UI */
        .reels { display: flex; justify-content: center; gap: 10px; margin: 15px 0; font-size: 45px; background: #000; padding: 15px; border-radius: 10px; border: 2px solid #444; }
        .reel { width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; background: #111; border-radius: 5px; border: 1px solid #222; }
        .casino-btn { width: 100%; padding: 15px; background: var(--gold); color: black; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; }

        .code-input { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: var(--gold); border-radius: 5px; margin-top: 10px; box-sizing: border-box; text-align: center; }
        .code-btn { width: 100%; padding: 10px; background: var(--neon); color: black; border: none; border-radius: 5px; margin-top: 5px; font-weight: bold; cursor: pointer; }
        
        .pop-text { position: fixed; pointer-events: none; z-index: 1000; font-weight: 900; animation: fly 0.8s forwards; font-size: 24px; text-shadow: 2px 2px #000; color: var(--gold); }
        @keyframes fly { to { transform: translateY(-120px); opacity: 0; } }
    </style>
</head>
<body onload="core.init()">

    <div id="game-container">
        <nav id="sidebar">
            <div class="nav-btn active" onclick="ui.tab('staff', event)"><b>👥</b>EKIPA</div>
            <div class="nav-btn" onclick="ui.tab('shop', event)"><b>🛒</b>SKLEP</div>
            <div class="nav-btn" onclick="ui.tab('casino', event)"><b>🎰</b>KASYNO</div>
            <div class="nav-btn" onclick="ui.tab('skills', event)"><b>⚡</b>SKILLE</div>
            <div class="nav-btn" onclick="ui.tab('profile', event)"><b>👤</b>PROFIL</div>
            <div style="flex:1"></div>
            <div class="nav-btn" onclick="core.save()"><b>💾</b>ZAPIS</div>
        </nav>

        <main id="main-view">
            <div id="hud">
                <div class="stat-box"><div class="stat-val" id="money-display">0</div><div style="text-align:center; font-size:0.6rem; opacity:0.6">PLN</div></div>
                <div class="stat-box"><div class="stat-val" id="caps-display" style="color:var(--caps)">0</div><div style="text-align:center; font-size:0.6rem; color:var(--caps)">KAPSLE</div></div>
                <div class="stat-box"><div class="stat-val" id="income-display" style="color:var(--neon)">0</div><div style="text-align:center; font-size:0.6rem; opacity:0.6">ZYSK/S</div></div>
                <div class="stat-box"><div class="stat-val" id="mult-display" style="color:var(--success)">x1</div><div style="text-align:center; font-size:0.6rem; opacity:0.6">MNOŻNIK</div></div>
            </div>
            <div id="click-zone">
                <div id="main-target" onclick="core.click(event)">🍺</div>
            </div>
        </main>

        <aside id="side-panel">
            <div class="tab-header" id="header-text">EKIPA BAROWA</div>
            <div class="content" id="list-box"></div>
        </aside>
    </div>

    <script>
        const core = {
            money: 0, caps: 0, rebirths: 0,
            counts: [0, 0, 0, 0, 0],
            skills: [0, 0, 0],
            usedCodes: [],
            currentSkin: 0,
            ownedSkins: [0],
            isSpinning: false,
            lastResult: ["🍺", "🍺", "🍺"],
            stats: { totalMoney: 0, totalClicks: 0, spins: 0, playTime: 0 },

            skins: [
                { id: 0, name: "Zwykłe Jasne", icon: "🍺", cost: 0, mult: 1 },
                { id: 1, name: "Pszeniczne", icon: "🌾", cost: 500, mult: 1.5 },
                { id: 2, name: "Mrożony Kufel", icon: "❄️", cost: 2500, mult: 2.5 },
                { id: 3, name: "Ciemne Mocne", icon: "🧉", cost: 10000, mult: 5 },
                { id: 4, name: "Sok Malinowy", icon: "🥤", cost: 50000, mult: 10 },
                { id: 5, name: "Zielone (Irlandzkie)", icon: "🍀", cost: 150000, mult: 25 },
                { id: 6, name: "Imbirowe", icon: "🫚", cost: 500000, mult: 60 },
                { id: 7, name: "Miodowe", icon: "🍯", cost: 1500000, mult: 150 },
                { id: 8, name: "Puszka Eksportowa", icon: "🥫", cost: 5000000, mult: 400 },
                { id: 9, name: "Beczka Dębowa", icon: "🛢️", cost: 20000000, mult: 1000 },
                { id: 10, name: "Kufel Wikinga", icon: "🪓", cost: 100000000, mult: 3000 },
                { id: 11, name: "Neonowe IPA", icon: "🌈", cost: 500000000, mult: 7500 },
                { id: 12, name: "Królewski Puchar", icon: "🏆", cost: 2000000000, mult: 20000 },
                { id: 13, name: "Diamentowy Kufel", icon: "💎", cost: 10000000000, mult: 100000 },
                { id: 14, name: "Piwo Bogów", icon: "⚡", cost: 100000000000, mult: 1000000 }
            ],

            init() {
                this.load();
                setInterval(() => { 
                    let inc = this.getIncome()/10;
                    this.money += inc; this.stats.totalMoney += inc; this.stats.playTime += 0.1;
                    ui.refresh(); 
                }, 100);
                ui.render();
            },

            getIncome() {
                let base = 0;
                let powers = [1.5, 15, 80, 400, 2000];
                this.counts.forEach((c, i) => base += c * powers[i]);
                // Skill 2 (Marketing) dodaje 25% zysku za poziom
                return base * (1 + this.rebirths * 3) * (1 + this.skills[2] * 0.25);
            },

            click(e) {
                // Skill 0 (Szybki klik) dodaje 50% mocy kliku za poziom
                let gain = (1 + (this.getIncome() * 0.1)) * (1 + this.skills[0] * 0.5) * this.skins[this.currentSkin].mult;
                this.money += gain; this.stats.totalMoney += gain; this.stats.totalClicks++;
                if (Math.random() < 0.03) this.caps++;
                ui.pop(e.clientX, e.clientY, "+" + Math.floor(gain).toLocaleString());
                ui.refresh();
            },

            buyStaff(i) {
                let costs = [15, 250, 2000, 15000, 100000];
                // Skill 1 (Zniżki) daje 10% zniżki na poziom
                let discount = Math.pow(0.9, this.skills[1]);
                let cost = Math.floor(costs[i] * Math.pow(1.3, this.counts[i]) * discount);
                if (this.money >= cost) { this.money -= cost; this.counts[i]++; ui.render(); }
            },

            buySkill(i) {
                let baseCosts = [5, 15, 30];
                let cost = Math.floor(baseCosts[i] * Math.pow(2.5, this.skills[i]));
                if (this.caps >= cost) {
                    this.caps -= cost;
                    this.skills[i]++;
                    ui.render();
                }
            },

            spin() {
                if (this.money < 100 || this.isSpinning) return;
                this.money -= 100; this.isSpinning = true; this.stats.spins++;
                let symbols = ["🍺", "🍺", "🍺", "🍒", "🍒", "💎", "🔴"];
                let count = 0;
                let timer = setInterval(() => {
                    this.lastResult = [symbols[Math.floor(Math.random()*7)], symbols[Math.floor(Math.random()*7)], symbols[Math.floor(Math.random()*7)]];
                    document.getElementById('r1').innerText = this.lastResult[0];
                    document.getElementById('r2').innerText = this.lastResult[1];
                    document.getElementById('r3').innerText = this.lastResult[2];
                    if(count++ > 12) {
                        clearInterval(timer);
                        this.isSpinning = false;
                        if(this.lastResult[0] === this.lastResult[1] && this.lastResult[1] === this.lastResult[2]) {
                            let prize = 0;
                            if(this.lastResult[0] === "💎") prize = 50000;
                            else if(this.lastResult[0] === "🔴") { this.caps += 50; }
                            else prize = 2000;
                            this.money += prize;
                            confetti();
                        }
                        ui.render();
                    }
                }, 80);
            },

            buySkin(id) {
                const s = this.skins[id];
                if (this.ownedSkins.includes(id)) { this.currentSkin = id; ui.render(); return; }
                if (this.money >= s.cost) {
                    this.money -= s.cost; this.ownedSkins.push(id); this.currentSkin = id;
                    confetti(); ui.render();
                }
            },

            redeemCode() {
                const code = document.getElementById('promo-input').value.toUpperCase();
                const promo = { "START2026": {m:5000, c:0}, "CAPS4FREE": {m:0, c:50}, "LUCKYBEER": {m:25000, c:0} };
                if (this.usedCodes.includes(code)) return alert("Kod już zużyty!");
                if (promo[code]) {
                    this.money += promo[code].m; this.caps += promo[code].c;
                    this.usedCodes.push(code); confetti(); ui.render();
                }
            },

            save() { localStorage.setItem('beer_v6_save', JSON.stringify({m:this.money, c:this.caps, cnt:this.counts, sk:this.skills, skins:this.ownedSkins, cur:this.currentSkin, codes:this.usedCodes, st:this.stats})); },
            load() {
                let d = JSON.parse(localStorage.getItem('beer_v6_save'));
                if(d) Object.assign(this, {money:d.m, caps:d.c, counts:d.cnt, skills:d.sk, ownedSkins:d.skins, currentSkin:d.cur, usedCodes:d.codes, stats:d.st});
            }
        };

        const ui = {
            currentTab: 'staff',
            tab(t, e) { this.currentTab = t; document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); e.currentTarget.classList.add('active'); this.render(); },
            refresh() {
                document.getElementById('money-display').innerText = Math.floor(core.money).toLocaleString();
                document.getElementById('caps-display').innerText = core.caps;
                document.getElementById('income-display').innerText = Math.floor(core.getIncome()).toLocaleString();
                document.getElementById('mult-display').innerText = "x" + core.skins[core.currentSkin].mult.toLocaleString();
                document.getElementById('main-target').innerText = core.skins[core.currentSkin].icon;
            },
            render() {
                const box = document.getElementById('list-box'); box.innerHTML = "";
                const header = document.getElementById('header-text');

                if(this.currentTab === 'staff') {
                    header.innerText = "EKIPA BAROWA";
                    ["Praktykant", "Barman", "Kebabiarz", "Ochroniarz", "Managerka"].forEach((n, i) => {
                        let discount = Math.pow(0.9, core.skills[1]);
                        let cost = Math.floor([15, 250, 2000, 15000, 100000][i] * Math.pow(1.3, core.counts[i]) * discount);
                        box.innerHTML += `<div class="item-card" onclick="core.buyStaff(${i})" style="opacity:${core.money >= cost ? 1 : 0.5}">
                            <b>${n} (Lvl ${core.counts[i]})</b><br><span class="price">${cost.toLocaleString()} PLN</span>
                        </div>`;
                    });
                } else if(this.currentTab === 'shop') {
                    header.innerText = "SKLEP ZE SKINAMI";
                    core.skins.forEach(s => {
                        const owned = core.ownedSkins.includes(s.id);
                        const eq = core.currentSkin === s.id;
                        box.innerHTML += `<div class="item-card ${eq?'equipped':''}" onclick="core.buySkin(${s.id})">
                            ${eq?'<span class="badge">W UŻYCIU</span>':''}
                            <div style="display:flex; align-items:center; gap:15px">
                                <span style="font-size:30px">${s.icon}</span>
                                <div><b>${s.name}</b><br><small>Mult: x${s.mult.toLocaleString()}</small><br>
                                <span class="price">${owned ? 'POSIADASZ' : s.cost.toLocaleString() + ' PLN'}</span></div>
                            </div>
                        </div>`;
                    });
                } else if(this.currentTab === 'casino') {
                    header.innerText = "KASYNO KRÓLA";
                    box.innerHTML = `
                        <div class="item-card" style="cursor:default">
                            <center><small>Koszt: 100 PLN | Jackpot: 💎💎💎 (50k PLN)</small></center>
                            <div class="reels">
                                <div class="reel" id="r1">${core.lastResult[0]}</div>
                                <div class="reel" id="r2">${core.lastResult[1]}</div>
                                <div class="reel" id="r3">${core.lastResult[2]}</div>
                            </div>
                            <button class="casino-btn" onclick="core.spin()" ${core.money<100?'disabled':''}>LOSUJ!</button>
                        </div>`;
                } else if(this.currentTab === 'skills') {
                    header.innerText = "SKILLE (🔴 KAPSLE)";
                    ["Szybki Klik", "Zniżki", "Marketing"].forEach((name, i) => {
                        let cost = Math.floor([5, 15, 30][i] * Math.pow(2.5, core.skills[i]));
                        box.innerHTML += `<div class="item-card" onclick="core.buySkill(${i})" style="opacity:${core.caps >= cost ? 1 : 0.5}">
                            <b>${name} (Lvl ${core.skills[i]})</b><br>
                            <span style="color:var(--caps)">Koszt: ${cost} 🔴</span>
                        </div>`;
                    });
                } else if(this.currentTab === 'profile') {
                    header.innerText = "PROFIL I KODY";
                    box.innerHTML = `<div class="item-card" style="cursor:default">
                        <div class="stat-row"><span>Kliknięcia:</span><span>${core.stats.totalClicks}</span></div>
                        <div class="stat-row"><span>Skiny:</span><span>${core.ownedSkins.length}/15</span></div>
                    </div>
                    <div class="item-card" style="cursor:default; border-color:var(--neon)">
                        <b>WPISZ KOD:</b>
                        <input type="text" id="promo-input" class="code-input" placeholder="...">
                        <button class="code-btn" onclick="core.redeemCode()">OK</button>
                    </div>`;
                }
                this.refresh();
            },
            pop(x, y, t) {
                let e = document.createElement('div'); e.className='pop-text'; e.innerText=t; e.style.left=x+'px'; e.style.top=y+'px';
                document.body.appendChild(e); setTimeout(()=>e.remove(), 800);
            }
        };
    </script>
</body>
</html>
